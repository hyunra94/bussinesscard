<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>명함 OCR → 노션</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f7f7f5;
      --bg3: #f0f0ec;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.2);
      --text: #1a1a1a;
      --text2: #6b6b6b;
      --text3: #999;
      --radius: 10px;
      --radius-sm: 7px;
      --success-bg: #eaf3de;
      --success-text: #3b6d11;
      --error-bg: #fcebeb;
      --error-text: #a32d2d;
      --info-bg: #e6f1fb;
      --info-border: #85b7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg2: #242424;
        --bg3: #2e2e2e;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
        --text: #f0f0f0;
        --text2: #aaa;
        --text3: #666;
        --success-bg: #173404;
        --success-text: #c0dd97;
        --error-bg: #501313;
        --error-text: #f09595;
        --info-bg: #042c53;
        --info-border: #378add;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    .wrap { width: 100%; max-width: 560px; }

    header { margin-bottom: 1.5rem; }
    header h1 { font-size: 20px; font-weight: 600; }
    header p  { font-size: 13px; color: var(--text2); margin-top: 4px; }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .toggle-btn {
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      margin-bottom: 10px;
    }
    .toggle-btn:hover { color: var(--text); }

    .setting-row { margin-bottom: 10px; }
    .setting-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
    .setting-note  { font-size: 11px; color: var(--text3); }
    .setting-input {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--bg2);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Mono', monospace;
    }
    .setting-input:focus { outline: none; border-color: var(--text2); }

    .upload-zone {
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .upload-zone:hover, .upload-zone.drag { background: var(--info-bg); border-color: var(--info-border); }

    #preview-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      display: none;
    }

    .field-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: start;
      gap: 8px;
      margin-bottom: 10px;
    }
    .field-meta  { padding-top: 8px; }
    .field-label { font-size: 13px; color: var(--text2); }
    .field-sub   { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .field-input {
      width: 100%;
      padding: 7px 10px;
      font-size: 14px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--bg2);
      color: var(--text);
      font-family: inherit;
    }
    .field-input:focus { outline: none; border-color: var(--text2); background: var(--bg); }
    textarea.field-input { resize: vertical; min-height: 72px; line-height: 1.5; }

    .category-chips { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 6px; }
    .chip {
      padding: 5px 13px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text2);
      font-family: inherit;
      transition: all 0.12s;
    }
    .chip:hover { border-color: var(--text2); color: var(--text); }
    .chip.selected { font-weight: 500; }
    .chip[data-val="업체"].selected      { background:#FAECE7; color:#993C1D; border-color:#F0997B; }
    .chip[data-val="기관"].selected      { background:#FBEAF0; color:#993556; border-color:#ED93B1; }
    .chip[data-val="협약기업"].selected   { background:#E1F5EE; color:#0F6E56; border-color:#5DCAA5; }
    .chip[data-val="플랫폼 사업단"].selected { background:#FAEEDA; color:#854F0B; border-color:#EF9F27; }
    .chip[data-val="플랫폼 기관"].selected  { background:#E6F1FB; color:#185FA5; border-color:#85B7EB; }
    .chip[data-val="명함"].selected      { background:#EEEDFE; color:#534AB7; border-color:#AFA9EC; }
    .chip[data-val="기타"].selected      { background:var(--bg3); color:var(--text); border-color:var(--text2); }

    @media (prefers-color-scheme: dark) {
      .chip[data-val="업체"].selected      { background:#4A1B0C; color:#F5C4B3; border-color:#D85A30; }
      .chip[data-val="기관"].selected      { background:#4B1528; color:#F4C0D1; border-color:#D4537E; }
      .chip[data-val="협약기업"].selected   { background:#04342C; color:#9FE1CB; border-color:#1D9E75; }
      .chip[data-val="플랫폼 사업단"].selected { background:#412402; color:#FAC775; border-color:#BA7517; }
      .chip[data-val="플랫폼 기관"].selected  { background:#042C53; color:#B5D4F4; border-color:#378ADD; }
      .chip[data-val="명함"].selected      { background:#26215C; color:#CECBF6; border-color:#7F77DD; }
    }

    .check-row { display: flex; align-items: center; gap: 8px; padding-top: 6px; }
    .check-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--text); }
    .check-row label { font-size: 13px; color: var(--text2); cursor: pointer; }

    .divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 14px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.12s;
    }
    .btn:hover { background: var(--bg2); }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; }
    .btn-primary:hover { opacity: 0.85; background: var(--text); }

    .status {
      font-size: 13px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-top: 10px;
      line-height: 1.5;
    }
    .status.loading { background: var(--bg2);        color: var(--text2);        }
    .status.success { background: var(--success-bg); color: var(--success-text); }
    .status.error   { background: var(--error-bg);   color: var(--error-text);   }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border2);
      border-top-color: var(--text2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>📇 명함 OCR → 노션</h1>
    <p>명함 사진을 찍으면 AI가 인식해서 노션 DB에 바로 저장해요</p>
  </header>

  <button class="toggle-btn" id="toggle-btn" onclick="toggleSettings()">▸ 노션 설정 (Worker URL · 토큰 · DB ID)</button>
  <div id="settings-panel" style="display:none;" class="card">
    <div class="setting-row">
      <label class="setting-label">Cloudflare Worker URL <span class="setting-note">— Claude 인식 + 노션 저장 모두 여기를 통해요</span></label>
      <input class="setting-input" id="cf-url" type="text" placeholder="https://your-worker.workers.dev" />
    </div>
    <div class="setting-row">
      <label class="setting-label">Notion Integration Token</label>
      <input class="setting-input" id="notion-token" type="password" placeholder="secret_xxxxxxxxxxxxxxxxxxxx" />
    </div>
    <div class="setting-row">
      <label class="setting-label">Database ID</label>
      <input class="setting-input" id="notion-db" type="text" placeholder="32자리 DB ID" />
    </div>
    <div class="btn-row" style="margin-top:4px;">
      <button class="btn btn-primary" onclick="saveSettings()">저장</button>
    </div>
    <div id="settings-status"></div>
  </div>

  <div class="section-label">명함 업로드</div>
  <div class="card">
    <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFile(this.files[0])" />
    <div class="upload-zone" id="drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
      <div style="font-size:32px;margin-bottom:10px;">📷</div>
      <div style="font-size:15px;font-weight:500;">명함 이미지를 올려주세요</div>
      <div style="font-size:13px;color:var(--text2);margin-top:4px;">클릭하거나 드래그 & 드롭 · JPG, PNG, HEIC</div>
    </div>
    <img id="preview-img" />
    <div id="ocr-status"></div>
    <div class="btn-row" style="margin-top:10px;display:none;" id="action-btns">
      <button class="btn btn-primary" onclick="runOCR()">
        <span class="spinner" id="ocr-spinner" style="display:none;"></span>
        AI로 명함 인식
      </button>
    </div>
  </div>

  <div id="result-section" style="display:none;">
    <div class="section-label">인식 결과 확인 & 수정</div>
    <div class="card">
      <div class="field-row">
        <div class="field-meta"><div class="field-label">Name</div><div class="field-sub">이름 + 직책</div></div>
        <input class="field-input" id="f-name" placeholder="홍길동 팀장" />
      </div>
      <div class="field-row">
        <div class="field-meta"><div class="field-label">Companyname</div><div class="field-sub">회사명 (Title)</div></div>
        <input class="field-input" id="f-companyname" placeholder="(주)전주MBC" />
      </div>
      <div class="field-row">
        <div class="field-meta"><div class="field-label">Company</div><div class="field-sub">부서 / 팀명</div></div>
        <input class="field-input" id="f-company" placeholder="국비사업부서" />
      </div>
      <div class="field-row">
        <div class="field-meta"><div class="field-label">Phone</div></div>
        <input class="field-input" id="f-phone" placeholder="010-0000-0000" />
      </div>
      <div class="field-row">
        <div class="field-meta"><div class="field-label">Email</div></div>
        <input class="field-input" id="f-email" type="email" placeholder="hello@example.com" />
      </div>
      <div class="field-row">
        <div class="field-meta"><div class="field-label">Category</div><div class="field-sub">분류 선택</div></div>
        <div class="category-chips" id="category-chips">
          <button class="chip" data-val="업체" onclick="selectChip(this)">업체</button>
          <button class="chip" data-val="기관" onclick="selectChip(this)">기관</button>
          <button class="chip" data-val="협약기업" onclick="selectChip(this)">협약기업</button>
          <button class="chip" data-val="플랫폼 사업단" onclick="selectChip(this)">플랫폼 사업단</button>
          <button class="chip" data-val="플랫폼 기관" onclick="selectChip(this)">플랫폼 기관</button>
          <button class="chip" data-val="명함" onclick="selectChip(this)">명함</button>
          <button class="chip" data-val="기타" onclick="selectChip(this)">기타</button>
        </div>
      </div>
      <div class="field-row">
        <div class="field-meta"><div class="field-label">Notes</div><div class="field-sub">개인 메모</div></div>
        <textarea class="field-input" id="f-notes" placeholder="어디서 만났는지, 특이사항 등..."></textarea>
      </div>
      <div class="field-row">
        <div class="field-meta"><div class="field-label">card</div></div>
        <div class="check-row">
          <input type="checkbox" id="f-card" checked />
          <label for="f-card">명함 보유</label>
        </div>
      </div>
      <hr class="divider" />
      <div class="btn-row">
        <button class="btn btn-primary" onclick="sendToNotion()">
          <span class="spinner" id="save-spinner" style="display:none;"></span>
          노션에 저장 ↗
        </button>
        <button class="btn" onclick="resetAll()">다시 촬영</button>
      </div>
      <div id="notion-status"></div>
    </div>
  </div>

</div>
<script>
let imageBase64 = null;
let imageMime = 'image/jpeg';
let selectedCategory = null;

function getSettings() {
  return JSON.parse(localStorage.getItem('bcard_settings') || '{}');
}

function selectChip(el) {
  document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('selected'));
  if (selectedCategory === el.dataset.val) {
    selectedCategory = null;
  } else {
    el.classList.add('selected');
    selectedCategory = el.dataset.val;
  }
}

function toggleSettings() {
  const p   = document.getElementById('settings-panel');
  const btn = document.getElementById('toggle-btn');
  const open = p.style.display === 'none';
  p.style.display = open ? 'block' : 'none';
  btn.textContent = (open ? '▾' : '▸') + ' 노션 설정 (Worker URL · 토큰 · DB ID)';
  if (open) {
    const s = getSettings();
    if (s.cf)    document.getElementById('cf-url').value       = s.cf;
    if (s.token) document.getElementById('notion-token').value = s.token;
    if (s.db)    document.getElementById('notion-db').value    = s.db;
  }
}

function saveSettings() {
  const s = {
    cf:    document.getElementById('cf-url').value.trim().replace(/\/$/, ''),
    token: document.getElementById('notion-token').value.trim(),
    db:    document.getElementById('notion-db').value.trim()
  };
  localStorage.setItem('bcard_settings', JSON.stringify(s));
  const el = document.getElementById('settings-status');
  el.innerHTML = '<div class="status success">저장 완료!</div>';
  setTimeout(() => { el.innerHTML = ''; updateToggleLabel(); }, 1500);
}

function updateToggleLabel() {
  const s = getSettings();
  const btn = document.getElementById('toggle-btn');
  if (s.cf && s.token && s.db) {
    btn.textContent = '✓ 노션 설정 완료  (수정하려면 클릭)';
  }
}

function handleFile(file) {
  if (!file) return;
  imageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    const img = document.getElementById('preview-img');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('action-btns').style.display    = 'flex';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('ocr-status').innerHTML         = '';
  };
  reader.readAsDataURL(file);
}

async function runOCR() {
  if (!imageBase64) return;
  const s = getSettings();
  if (!s.cf) {
    document.getElementById('ocr-status').innerHTML =
      '<div class="status error">Worker URL을 먼저 설정해주세요.</div>';
    if (document.getElementById('settings-panel').style.display === 'none') toggleSettings();
    return;
  }

  const spinner = document.getElementById('ocr-spinner');
  const status  = document.getElementById('ocr-status');
  spinner.style.display = 'inline-block';
  status.innerHTML = '<div class="status loading">명함을 분석하는 중...</div>';

  try {
    const resp = await fetch(`${s.cf}/v1/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
            { type: 'text', text: `명함 이미지에서 정보를 추출하세요. 반드시 JSON만 반환, 다른 텍스트 없이.

규칙:
- name: "이름 직책" 형식 (예: "홍길동 팀장", "김철수 대표이사")
- companyname: 회사 전체 이름 (예: "(주)전주MBC")
- company: 부서명 또는 팀명. 없으면 빈 문자열.
- phone: 전화번호나 휴대폰 중 하나. 여러 개면 첫 번째.
- email: 이메일 주소. 없으면 빈 문자열.

JSON 형식:
{"name":"","companyname":"","company":"","phone":"","email":""}` }
          ]
        }]
      })
    });

    // 응답 텍스트 먼저 받기
    const rawText = await resp.text();

    // 응답이 정상인지 확인
    if (!resp.ok) {
      status.innerHTML = `<div class="status error">API 오류 (${resp.status}): ${rawText}</div>`;
      return;
    }

    // JSON 파싱
    let data;
    try {
      data = JSON.parse(rawText);
    } catch(e) {
      status.innerHTML = `<div class="status error">응답 파싱 실패: ${rawText.slice(0, 200)}</div>`;
      return;
    }

    // content 필드 확인
    if (!data.content || !Array.isArray(data.content)) {
      status.innerHTML = `<div class="status error">예상치 못한 응답: ${JSON.stringify(data).slice(0, 200)}</div>`;
      return;
    }

    const text  = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch(e) {
      status.innerHTML = `<div class="status error">JSON 파싱 실패: ${clean.slice(0, 200)}</div>`;
      return;
    }

    document.getElementById('f-name').value        = parsed.name        || '';
    document.getElementById('f-companyname').value = parsed.companyname || '';
    document.getElementById('f-company').value     = parsed.company     || '';
    document.getElementById('f-phone').value       = parsed.phone       || '';
    document.getElementById('f-email').value       = parsed.email       || '';
    document.getElementById('f-notes').value       = '';
    document.getElementById('f-card').checked      = true;
    selectedCategory = null;
    document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('selected'));

    document.getElementById('result-section').style.display = 'block';
    status.innerHTML = '<div class="status success">인식 완료! 내용을 확인하고 수정하세요.</div>';

  } catch (err) {
    status.innerHTML = `<div class="status error">오류: ${err.message}</div>`;
  } finally {
    spinner.style.display = 'none';
  }
}

async function sendToNotion() {
  const s = getSettings();
  if (!s.cf || !s.token || !s.db) {
    document.getElementById('notion-status').innerHTML =
      '<div class="status error">노션 설정(Worker URL, 토큰, DB ID)을 먼저 입력해주세요.</div>';
    if (document.getElementById('settings-panel').style.display === 'none') toggleSettings();
    return;
  }

  const saveSpinner = document.getElementById('save-spinner');
  const statusEl    = document.getElementById('notion-status');
  saveSpinner.style.display = 'inline-block';
  statusEl.innerHTML = '<div class="status loading">저장하는 중...</div>';

  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();

  const properties = {
    "Companyname": { title:     [{ text: { content: document.getElementById('f-companyname').value } }] },
    "Name":        { rich_text: [{ text: { content: document.getElementById('f-name').value        } }] },
    "Company":     { rich_text: [{ text: { content: document.getElementById('f-company').value     } }] },
    "Notes":       { rich_text: [{ text: { content: document.getElementById('f-notes').value       } }] },
    "card":        { checkbox: document.getElementById('f-card').checked }
  };
  if (phone) properties["Phone"]    = { phone_number: phone };
  if (email) properties["Email"]    = { email: email };
  if (selectedCategory) properties["Category"] = { select: { name: selectedCategory } };

  try {
    const resp = await fetch(`${s.cf}/v1/pages`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Notion-Token': s.token
      },
      body: JSON.stringify({ parent: { database_id: s.db }, properties })
    });

    if (resp.ok) {
      statusEl.innerHTML = '<div class="status success">노션에 저장되었습니다!</div>';
      setTimeout(() => {
        if (confirm('저장 완료! 다음 명함을 등록할까요?')) resetAll();
      }, 800);
    } else {
      const err = await resp.json();
      statusEl.innerHTML = `<div class="status error">노션 오류: ${err.message || resp.status}</div>`;
    }
  } catch (err) {
    statusEl.innerHTML = `<div class="status error">요청 실패: ${err.message}</div>`;
  } finally {
    saveSpinner.style.display = 'none';
  }
}

function resetAll() {
  imageBase64 = null;
  selectedCategory = null;
  document.getElementById('preview-img').style.display    = 'none';
  document.getElementById('action-btns').style.display    = 'none';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('ocr-status').innerHTML         = '';
  document.getElementById('notion-status').innerHTML      = '';
  document.getElementById('file-input').value             = '';
  document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('selected'));
}

window.addEventListener('DOMContentLoaded', updateToggleLabel);
</script>
</body>
</html>
