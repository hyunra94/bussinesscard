<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

  <!-- 파비콘 -->
  <link rel="icon" href="https://hyunra94.github.io/assets/favicon.png">

  <!-- OG 태그 -->
  <meta property="og:title" content="명함 스캐너">
  <meta property="og:description" content="명함 이미지 OCR">
  <meta property="og:image" content="https://hyunra94.github.io/assets/og-default.png">

 <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #FAF7F2;
      --beige:   #F2EDE4;
      --beige2:  #E8E0D3;
      --beige3:  #D9CEBF;
      --text:    #2C2416;
      --text2:   #7A6A55;
      --text3:   #A89880;
      --accent:  #C4956A;
      --accent2: #B07D52;
      --success-bg:   #EEF5E8;
      --success-text: #4A7A2A;
      --error-bg:     #FAF0EE;
      --error-text:   #A03020;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    html { background: var(--cream); }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--cream); color: var(--text);
      min-height: 100vh; padding: 0 0 80px;
    }

    .app-header {
      background: var(--beige); border-bottom: 1px solid var(--beige2);
      padding: 52px 20px 20px; position: sticky; top: 0; z-index: 10;
    }
    .app-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    .app-header p  { font-size: 13px; color: var(--text2); margin-top: 3px; font-weight: 300; }

    .section { padding: 0 16px; margin-top: 20px; }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text3);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; padding-left: 4px;
    }

    .card {
      background: #fff; border-radius: var(--radius-lg);
      padding: 18px; box-shadow: 0 2px 12px rgba(139,115,85,0.08); margin-bottom: 12px;
    }

    .settings-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; background: #fff; border: none; border-radius: var(--radius-md);
      padding: 14px 18px; font-family: inherit; font-size: 14px; font-weight: 500;
      color: var(--text2); cursor: pointer;
      box-shadow: 0 2px 12px rgba(139,115,85,0.08); margin-bottom: 12px; transition: background 0.15s;
    }
    .settings-toggle:hover { background: var(--beige); }
    .settings-toggle .icon {
      width: 28px; height: 28px; background: var(--beige); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .settings-toggle .left { display: flex; align-items: center; gap: 10px; }
    .settings-toggle .arrow { font-size: 12px; color: var(--text3); transition: transform 0.2s; }
    .settings-toggle.open .arrow { transform: rotate(180deg); }

    .setting-row { margin-bottom: 14px; }
    .setting-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }

    .cat-manage-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .cat-manage-item {
      display: flex; align-items: center; gap: 6px;
      background: var(--beige); border: 1.5px solid var(--beige2);
      border-radius: 999px; padding: 5px 10px 5px 14px;
      font-size: 13px; font-weight: 500; color: var(--text2);
    }
    .cat-manage-item button {
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 14px; line-height: 1; padding: 0;
      display: flex; align-items: center; transition: color 0.15s;
    }
    .cat-manage-item button:hover { color: var(--error-text); }
    .cat-add-row { display: flex; gap: 8px; align-items: center; }
    .cat-add-input {
      flex: 1; padding: 10px 12px; font-size: 13px;
      border: 1.5px solid var(--beige2); border-radius: var(--radius-sm);
      background: var(--beige); color: var(--text); font-family: 'Noto Sans KR', sans-serif;
    }
    .cat-add-input:focus { outline: none; border-color: var(--accent); background: #fff; }
    .cat-add-btn {
      padding: 10px 16px; font-size: 13px; font-weight: 600;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap;
      font-family: 'Noto Sans KR', sans-serif; transition: background 0.15s;
    }
    .cat-add-btn:hover { background: var(--accent2); }

    .upload-zone {
      border: 2px dashed var(--beige3); border-radius: var(--radius-md);
      padding: 36px 20px; text-align: center; cursor: pointer;
      transition: all 0.2s; background: var(--beige);
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #FDF6EE; }
    .upload-zone .upload-emoji { font-size: 40px; display: block; margin-bottom: 12px; }
    .upload-zone .upload-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .upload-zone .upload-sub { font-size: 12px; color: var(--text3); margin-top: 5px; font-weight: 300; }

    .field-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--beige);
    }
    .field-item:last-of-type { border-bottom: none; }
    .field-icon {
      width: 36px; height: 36px; border-radius: 10px; background: var(--beige);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0; margin-top: 2px;
    }
    .field-right { flex: 1; min-width: 0; }
    .field-label {
      font-size: 11px; font-weight: 600; color: var(--text3);
      letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px;
    }
    .field-input {
      width: 100%; padding: 8px 0; font-size: 15px;
      border: none; border-bottom: 1.5px solid var(--beige2); border-radius: 0;
      background: transparent; color: var(--text);
      font-family: 'Noto Sans KR', sans-serif; transition: border-color 0.15s;
    }
    .field-input:focus { outline: none; border-bottom-color: var(--accent); }
    .field-input::placeholder { color: var(--beige3); }
    textarea.field-input { resize: none; min-height: 60px; line-height: 1.6; }

    .chips-wrap { display: flex; flex-wrap: wrap; gap: 7px; padding: 8px 0 4px; }
    .chip {
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1.5px solid var(--beige2); background: var(--beige);
      color: var(--text2); font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.15s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

    .check-row { display: flex; align-items: center; gap: 10px; padding: 12px 0 4px; }
    .check-row input[type=checkbox] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }
    .check-row label { font-size: 14px; color: var(--text2); cursor: pointer; }

    .btn-primary {
      width: 100%; padding: 16px; font-size: 16px; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-md); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover  { background: var(--accent2); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      width: 100%; padding: 14px; font-size: 14px; font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif; background: transparent;
      color: var(--text2); border: 1.5px solid var(--beige2);
      border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; margin-top: 8px;
    }
    .btn-secondary:hover { background: var(--beige); border-color: var(--beige3); }

    .btn-save-small {
      padding: 10px 20px; font-size: 13px; font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      transition: background 0.15s; margin-top: 4px;
    }
    .btn-save-small:hover { background: var(--accent2); }

    .msg {
      font-size: 13px; padding: 12px 16px; border-radius: var(--radius-sm);
      margin-top: 12px; line-height: 1.6;
    }
    .msg.success { background: var(--success-bg); color: var(--success-text); }
    .msg.error   { background: var(--error-bg);  color: var(--error-text); }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .done-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; color: var(--success-text);
      background: var(--success-bg); padding: 3px 10px; border-radius: 999px;
    }

    .vflat-btn {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border-radius: var(--radius-md);
      padding: 14px 18px; margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(139,115,85,0.08);
      color: var(--text); cursor: pointer;
      border: none; width: 100%; font-family: inherit; transition: background 0.15s;
    }
    .vflat-btn:hover { background: var(--beige); }
    .vflat-btn .icon-wrap {
      width: 40px; height: 40px; border-radius: 10px; background: var(--beige);
      display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .vflat-btn .label { flex: 1; font-size: 14px; font-weight: 600; text-align: left; }
    .vflat-btn .arrow { font-size: 18px; color: var(--text3); }
  </style>
</head>
<body>

  <div class="app-header">
    <h1>📇 명함 스캐너</h1>
    <p>사진 한 장으로 노션에 바로 저장</p>
  </div>

  <!-- 설정 (카테고리 관리만) -->
  <div class="section">
    <button class="settings-toggle" id="toggle-btn" onclick="toggleSettings()">
      <div class="left">
        <div class="icon">⚙️</div>
        <span id="toggle-label">카테고리 설정</span>
      </div>
      <span class="arrow">▼</span>
    </button>
    <div id="settings-panel" style="display:none;" class="card">
      <div class="setting-row">
        <label class="setting-label">카테고리 관리</label>
        <div class="cat-manage-wrap" id="cat-manage-list"></div>
        <div class="cat-add-row">
          <input class="cat-add-input" id="cat-new-input" placeholder="새 카테고리 입력"
            onkeydown="if(event.key==='Enter') addCategory()" />
          <button class="cat-add-btn" onclick="addCategory()">+ 추가</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 업로드 -->
  <div class="section">
    <div class="section-label">명함 촬영</div>

    <button class="vflat-btn" onclick="openVFlat()">
      <div class="icon-wrap">📄</div>
      <span class="label">vFlat으로 스캔하기</span>
      <span class="arrow">→</span>
    </button>

    <div class="card" style="padding:0;overflow:hidden;">
      <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="handleFile(this.files[0])" />
      <div class="upload-zone" id="drop-zone"
        onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])"
        style="border-radius:0;border:none;">
        <span class="upload-emoji">📷</span>
        <div class="upload-title">탭해서 명함 촬영 또는 선택</div>
        <div class="upload-sub">JPG · PNG · HEIC 지원</div>
      </div>
    </div>

    <div id="preview-card" style="display:none;" class="card">
      <img id="preview-img" style="display:block;width:100%;max-height:180px;object-fit:contain;border-radius:10px;margin-bottom:14px;" />
      <div id="ocr-msg"></div>
      <button class="btn-primary" onclick="runOCR()" style="margin-top:4px;">
        <span class="spinner" id="ocr-spinner" style="display:none;"></span>
        <span id="ocr-btn-text">✨ AI로 명함 인식하기</span>
      </button>
      <button class="btn-secondary" onclick="resetAll()">다시 선택</button>
    </div>
  </div>

  <!-- 결과 -->
  <div id="result-section" style="display:none;">
    <div class="section">
      <div class="section-label">인식 결과</div>
      <div class="card">

        <div class="field-item">
          <div class="field-icon">👤</div>
          <div class="field-right">
            <div class="field-label">이름 · 직책 (Name)</div>
            <input class="field-input" id="f-name" placeholder="홍길동 팀장" />
          </div>
        </div>

        <div class="field-item">
          <div class="field-icon">🏢</div>
          <div class="field-right">
            <div class="field-label">회사 소속명 (Companyname)</div>
            <input class="field-input" id="f-companyname" placeholder="(주)전주MBC K-디지털 팀" />
          </div>
        </div>

        <div class="field-item">
          <div class="field-icon">📞</div>
          <div class="field-right">
            <div class="field-label">회사 번호 (Company)</div>
            <input class="field-input" id="f-company" placeholder="063-000-0000" />
          </div>
        </div>

        <div class="field-item">
          <div class="field-icon">📱</div>
          <div class="field-right">
            <div class="field-label">핸드폰 번호 (Phone)</div>
            <input class="field-input" id="f-phone" placeholder="010-0000-0000" />
          </div>
        </div>

        <div class="field-item">
          <div class="field-icon">✉️</div>
          <div class="field-right">
            <div class="field-label">이메일</div>
            <input class="field-input" id="f-email" type="email" placeholder="hello@example.com" />
          </div>
        </div>

        <div class="field-item">
          <div class="field-icon">🏷️</div>
          <div class="field-right">
            <div class="field-label">카테고리</div>
            <div class="chips-wrap" id="category-chips"></div>
          </div>
        </div>

        <div class="field-item">
          <div class="field-icon">📝</div>
          <div class="field-right">
            <div class="field-label">메모</div>
            <textarea class="field-input" id="f-notes" placeholder="어디서 만났는지, 특이사항 등..."></textarea>
          </div>
        </div>

        <div class="field-item" style="border-bottom:none;">
          <div class="field-icon">✅</div>
          <div class="field-right">
            <div class="field-label">명함 보유</div>
            <div class="check-row" style="padding-top:6px;">
              <input type="checkbox" id="f-card" checked />
              <label for="f-card">명함 있음</label>
            </div>
          </div>
        </div>

      </div>

      <button class="btn-primary" onclick="sendToNotion()">
        <span class="spinner" id="save-spinner" style="display:none;"></span>
        <span id="save-btn-text">노션에 저장하기 →</span>
      </button>
      <button class="btn-secondary" onclick="resetAll()">처음으로</button>
      <div id="notion-msg"></div>
    </div>
  </div>

<script>
  // ┌─────────────────────────────────────────┐
  // │  여기만 수정하면 돼요!                      │
  // └─────────────────────────────────────────┘
  const CF_WORKER_URL = 'https://notion-proxy.abyss9405.workers.dev'; // Cloudflare Worker URL
  const SECRET_KEY    = 'hyunra2026';                 // Cloudflare 환경변수 SECRET_KEY와 동일하게
  const NOTION_DB_ID  = '1a16b59b151a802f9d66d46ec7e82e93';              // Notion DB ID
  // ──────────────────────────────────────────

let imageBase64 = null;
let imageFile   = null;
let imageMime   = 'image/jpeg';
let selectedCategory = null;

const AREA_CODE = /^0(2|3[1-3]|4[1-4]|5[1-5]|6[1-4])\d/;
const MOBILE    = /^01[016789]/;
const DEFAULT_CATEGORIES = ['업체','기관','협약기업','사업단','플랫폼 사업단','플랫폼 기관','명함','기타'];

// 공통 fetch 헬퍼 (secret key 헤더 자동 첨부)
function cfFetch(path, options = {}) {
  return fetch(`${CF_WORKER_URL}${path}`, {
    ...options,
    headers: {
      ...(options.headers || {}),
      'X-Secret-Key': SECRET_KEY,
    }
  });
}

/* ── vFlat ── */
function openVFlat() {
  const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid = /android/i.test(navigator.userAgent);
  if (!isIOS && !isAndroid) { alert('vFlat은 모바일 앱이에요. 휴대폰에서 접속해주세요!'); return; }

  const storeUrl = isIOS
    ? 'https://apps.apple.com/kr/app/vflat-scan-pdf-scanner/id1494512368'
    : 'https://play.google.com/store/apps/details?id=com.voyagerx.scanner';

  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = 'vflat://';
  document.body.appendChild(iframe);
  setTimeout(() => {
    document.body.removeChild(iframe);
    if (!document.hidden) window.location.href = storeUrl;
  }, 2000);
}

/* ── 카테고리 ── */
function getCategories() {
  const saved = localStorage.getItem('bcard_categories');
  return saved ? JSON.parse(saved) : [...DEFAULT_CATEGORIES];
}
function saveCategories(list) { localStorage.setItem('bcard_categories', JSON.stringify(list)); }

function renderChips() {
  const wrap = document.getElementById('category-chips');
  wrap.innerHTML = '';
  getCategories().forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'chip'; btn.dataset.val = val; btn.textContent = val;
    btn.onclick = () => selectChip(btn);
    wrap.appendChild(btn);
  });
}

function renderCatManage() {
  const wrap = document.getElementById('cat-manage-list');
  wrap.innerHTML = '';
  getCategories().forEach((val, idx) => {
    const item = document.createElement('div');
    item.className = 'cat-manage-item';
    item.innerHTML = `<span>${val}</span><button onclick="removeCategory(${idx})" title="삭제">✕</button>`;
    wrap.appendChild(item);
  });
}

function addCategory() {
  const input = document.getElementById('cat-new-input');
  const val = input.value.trim();
  if (!val) return;
  const list = getCategories();
  if (list.includes(val)) { input.value = ''; return; }
  list.push(val);
  saveCategories(list);
  input.value = '';
  renderCatManage(); renderChips();
}

function removeCategory(idx) {
  const list = getCategories();
  const removed = list[idx];
  list.splice(idx, 1);
  saveCategories(list);
  renderCatManage(); renderChips();
  if (selectedCategory === removed) selectedCategory = null;
}

function selectChip(el) {
  document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('selected'));
  if (selectedCategory === el.dataset.val) { selectedCategory = null; }
  else { el.classList.add('selected'); selectedCategory = el.dataset.val; }
}

function toggleSettings() {
  const p   = document.getElementById('settings-panel');
  const btn = document.getElementById('toggle-btn');
  const open = p.style.display === 'none';
  p.style.display = open ? 'block' : 'none';
  btn.classList.toggle('open', open);
  if (open) renderCatManage();
}

function handleFile(file) {
  if (!file) return;
  imageFile = file; imageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('drop-zone').style.display    = 'none';
    document.getElementById('preview-card').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('ocr-msg').innerHTML = '';
  };
  reader.readAsDataURL(file);
}

async function runOCR() {
  if (!imageBase64) return;
  const spinner = document.getElementById('ocr-spinner');
  const btnText = document.getElementById('ocr-btn-text');
  const ocrMsg  = document.getElementById('ocr-msg');
  spinner.style.display = 'inline-block';
  btnText.textContent = '분석 중...';
  ocrMsg.innerHTML = '';

  try {
    const resp = await cfFetch('/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
            { type: 'text', text: `명함 이미지에서 아래 5개 필드를 추출하세요. JSON만 반환하고 다른 텍스트는 절대 포함하지 마세요.

[필드 정의 - 반드시 정확히 따르세요]

1. name
   - 사람 이름 + 직책
   - 예: "홍길동 팀장", "김철수 대표이사"

2. companyname
   - 회사명과 부서(팀)명을 합쳐서 하나의 문자열로 작성
   - 형식: "회사명 부서명" (띄어쓰기로 구분)
   - 부서명이 없으면 회사명만 작성
   - 예: "(주)전주MBC K-디지털 팀", "OO기업 영업본부", "ABC회사"

3. company
   - 회사 유선 전화번호만 입력 (지역번호로 시작하는 번호)
   - 허용 지역번호: 02, 031, 032, 033, 041, 042, 043, 044, 051, 052, 053, 054, 055, 061, 062, 063, 064
   - FAX 번호는 제외. 없으면 반드시 빈 문자열 ""
   - ※ 010, 011, 016, 017, 018, 019 로 시작하는 번호는 절대 입력 금지

4. phone
   - 개인 휴대폰 번호만 입력. 허용 시작번호: 010, 011, 016, 017, 018, 019
   - 없으면 반드시 빈 문자열 ""
   - ※ 02, 031 등 지역번호로 시작하는 번호는 절대 입력 금지

5. email
   - 이메일 주소. 없으면 빈 문자열 ""

[출력 형식 - 이것만 반환]
{"name":"","companyname":"","company":"","phone":"","email":""}` }
          ]
        }]
      })
    });

    const rawText = await resp.text();
    if (!resp.ok) { ocrMsg.innerHTML = `<div class="msg error">API 오류 (${resp.status})</div>`; return; }

    let data;
    try { data = JSON.parse(rawText); } catch(e) { ocrMsg.innerHTML = `<div class="msg error">응답 파싱 실패</div>`; return; }
    if (!data.content || !Array.isArray(data.content)) { ocrMsg.innerHTML = `<div class="msg error">예상치 못한 응답</div>`; return; }

    const text  = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    let parsed;
    try { parsed = JSON.parse(clean); } catch(e) { ocrMsg.innerHTML = `<div class="msg error">JSON 파싱 실패: ${clean.slice(0,200)}</div>`; return; }

    let phone   = (parsed.phone   || '').trim();
    let company = (parsed.company || '').trim();
    if (MOBILE.test(company))  { if (!phone)   phone   = company; company = ''; }
    if (AREA_CODE.test(phone)) { if (!company) company = phone;   phone   = ''; }

    document.getElementById('f-name').value        = parsed.name        || '';
    document.getElementById('f-companyname').value = parsed.companyname || '';
    document.getElementById('f-company').value     = company;
    document.getElementById('f-phone').value       = phone;
    document.getElementById('f-email').value       = parsed.email       || '';
    document.getElementById('f-notes').value       = '';
    document.getElementById('f-card').checked      = true;
    selectedCategory = null;
    document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('selected'));

    document.getElementById('result-section').style.display = 'block';
    document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    ocrMsg.innerHTML = '<div class="msg success">✓ 인식 완료! 내용을 확인하고 저장하세요.</div>';

  } catch (err) {
    ocrMsg.innerHTML = `<div class="msg error">오류: ${err.message}</div>`;
  } finally {
    spinner.style.display = 'none';
    btnText.textContent = '✨ AI로 명함 인식하기';
  }
}

async function sendToNotion() {
  const saveSpinner = document.getElementById('save-spinner');
  const saveBtnText = document.getElementById('save-btn-text');
  const notionMsg   = document.getElementById('notion-msg');
  saveSpinner.style.display = 'inline-block';
  saveBtnText.textContent   = '이미지 업로드 중...';
  notionMsg.innerHTML = '';

  try {
    let imageUrl = null;
    if (imageFile) {
      const formData = new FormData();
      formData.append('file', imageFile);
      const imgResp = await cfFetch('/upload/image', { method: 'POST', body: formData });
      if (imgResp.ok) { const imgData = await imgResp.json(); imageUrl = imgData.url; }
    }

    saveBtnText.textContent = '노션에 저장 중...';

    const phone   = document.getElementById('f-phone').value.trim();
    const company = document.getElementById('f-company').value.trim();
    const email   = document.getElementById('f-email').value.trim();

    const properties = {
      "Name":        { title:     [{ text: { content: document.getElementById('f-name').value        } }] },
      "Companyname": { rich_text: [{ text: { content: document.getElementById('f-companyname').value } }] },
      "Notes":       { rich_text: [{ text: { content: document.getElementById('f-notes').value       } }] },
      "card":        { checkbox: document.getElementById('f-card').checked }
    };
    if (phone)   properties["Phone"]      = { phone_number: phone };
    if (company) properties["Company"]    = { phone_number: company };
    if (email)   properties["Email"]      = { email: email };
    if (selectedCategory) properties["Category"] = { select: { name: selectedCategory } };
    if (imageUrl) properties["Card Image"] = { files: [{ type: "external", name: "card.jpg", external: { url: imageUrl } }] };

    const resp = await cfFetch('/v1/pages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ parent: { database_id: NOTION_DB_ID }, properties })
    });

    if (resp.ok) {
      notionMsg.innerHTML = '<div class="msg success">✓ 노션에 저장되었습니다!' + (imageUrl ? ' (이미지 포함)' : '') + '</div>';
      setTimeout(() => { if (confirm('저장 완료! 다음 명함을 등록할까요?')) resetAll(); }, 800);
    } else {
      const err = await resp.json();
      notionMsg.innerHTML = `<div class="msg error">노션 오류: ${err.message || resp.status}</div>`;
    }
  } catch (err) {
    notionMsg.innerHTML = `<div class="msg error">오류: ${err.message}</div>`;
  } finally {
    saveSpinner.style.display = 'none';
    saveBtnText.textContent   = '노션에 저장하기 →';
  }
}

function resetAll() {
  imageBase64 = null; imageFile = null; selectedCategory = null;
  document.getElementById('preview-img').src              = '';
  document.getElementById('drop-zone').style.display      = 'block';
  document.getElementById('preview-card').style.display   = 'none';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('ocr-msg').innerHTML            = '';
  document.getElementById('notion-msg').innerHTML         = '';
  document.getElementById('file-input').value             = '';
  document.querySelectorAll('#category-chips .chip').forEach(c => c.classList.remove('selected'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('DOMContentLoaded', () => {
  renderChips();
  renderCatManage();
});
